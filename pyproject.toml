[project]
name = "starter-template-fastapi"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "alembic>=1.18.4",
    "fastapi>=0.135.3",
    "psycopg[binary]>=3.3.3",
    "pydantic>=2.10",
    "pydantic-settings>=2.13.1",
    "sqlmodel>=0.0.38",
    "uvicorn[standard]>=0.44.0",
]

[dependency-groups]
dev = [
    "httpx>=0.28.0",
    "mypy>=1.18.2",
    "pre-commit>=4.3.0",
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "ruff>=0.14.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "--strict-markers"
markers = [
    "unit: default for new tests—cheap signal",
    "integration: cross-module wiring without a real port",
    "e2e: expensive; reserve for deployment-shaped checks",
]

[tool.ruff]
line-length = 88
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "B"]

[tool.mypy]
python_version = "3.14"
files = ["."]
exclude = ["^openspec/", "^\\.cursor/"]
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
