name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Quality + tests
        run: make ci

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Audit dependencies for known vulnerabilities
        run: uv run pip-audit

  sast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install

      - name: Static analysis (Bandit)
        # ``--severity-level medium`` skips low-confidence stylistic
        # findings. Tests are excluded because they intentionally use
        # constructs (assert, hardcoded creds) Bandit flags by default.
        run: |
          uv run --with bandit bandit -r src \
            --exclude src/features/auth/tests,src/features/kanban/tests,src/platform/tests \
            --severity-level medium

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration:
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Run integration tests (Docker via testcontainers)
        run: make test-integration

  migrations:
    needs: quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kanban_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Apply migrations
        env:
          APP_POSTGRESQL_DSN: postgresql+psycopg://postgres:postgres@localhost:5432/kanban_ci
        run: uv run alembic upgrade head

      - name: Verify no pending autogenerate drift
        env:
          APP_POSTGRESQL_DSN: postgresql+psycopg://postgres:postgres@localhost:5432/kanban_ci
        run: uv run alembic check

      - name: Verify downgrade runs cleanly
        env:
          APP_POSTGRESQL_DSN: postgresql+psycopg://postgres:postgres@localhost:5432/kanban_ci
        run: uv run alembic downgrade base

      - name: Re-apply after downgrade (idempotency)
        env:
          APP_POSTGRESQL_DSN: postgresql+psycopg://postgres:postgres@localhost:5432/kanban_ci
        run: uv run alembic upgrade head

  docker:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build runtime image
        run: docker build --target runtime -t starter-template-fastapi:ci .

      - name: Smoke-test runtime image
        run: |
          docker run -d --name ci-smoke \
            -e APP_AUTH_JWT_SECRET_KEY=ci-test-secret-key-min-32-chars \
            -e APP_ENVIRONMENT=development \
            -p 8000:8000 \
            starter-template-fastapi:ci
          # Wait for the process to start before probing.
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health/live; then
              echo "Liveness probe passed"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8000/health/live
          docker stop ci-smoke

  # Single aggregator job used as the required status check in branch protection.
  # Requiring one check instead of enumerating every matrix permutation keeps
  # the protection rule stable when jobs or Python versions change.
  ci-gate:
    name: CI Gate
    needs: [quality, audit, sast, integration, migrations, docker]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All required jobs passed
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for result in $results; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "A required job failed or was cancelled: $results"
              exit 1
            fi
          done
          echo "All required jobs passed."
