name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Default the workflow to read-only token scope. Jobs that need to write
# (upload SARIF, comment on PRs, etc.) raise their own permissions block.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --python ${{ env.PYTHON_VERSION }}

      - name: Cache pre-commit hooks
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.2.4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files --hook-stage pre-commit

  quality:
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --python ${{ env.PYTHON_VERSION }}

      - name: Smoke check — fastapi CLI installed (asserts fastapi[standard] is in the dev group)
        run: uv run fastapi --version

      - name: Quality
        run: make quality

  tests:
    needs: [pre-commit, quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --python ${{ env.PYTHON_VERSION }}

      - name: Unit + e2e tests (with line + branch coverage gate)
        run: make cov

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: coverage
          path: reports/coverage.*
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        continue-on-error: true
        uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7  # v5.5.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: reports/coverage.xml,reports/coverage.json
          fail_ci_if_error: false

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --python ${{ env.PYTHON_VERSION }}

      - name: Audit dependencies for known vulnerabilities
        run: uv run pip-audit

  sast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # gitleaks-action scans the commit range pushed; with a shallow
          # clone the "before" SHA is not present and git log fails.
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Static analysis (Bandit)
        # ``--severity-level medium`` skips low-confidence stylistic
        # findings. Tests are excluded because they intentionally use
        # constructs (assert, hardcoded creds) Bandit flags by default.
        run: |
          uv run --python ${{ env.PYTHON_VERSION }} --with bandit bandit -r src \
            --exclude '*/tests,*/tests/*' \
            --severity-level medium

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration:
    needs: [pre-commit, quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --python ${{ env.PYTHON_VERSION }}

      - name: Run integration tests (Docker via testcontainers)
        run: make test-integration

  migrations:
    needs: quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kanban_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --python ${{ env.PYTHON_VERSION }}

      - name: Apply migrations
        env:
          APP_POSTGRESQL_DSN: postgresql+psycopg://postgres:postgres@localhost:5432/kanban_ci
        run: uv run alembic upgrade head

      - name: Verify no pending autogenerate drift
        env:
          APP_POSTGRESQL_DSN: postgresql+psycopg://postgres:postgres@localhost:5432/kanban_ci
        run: uv run alembic check

      - name: Verify downgrade runs cleanly
        env:
          APP_POSTGRESQL_DSN: postgresql+psycopg://postgres:postgres@localhost:5432/kanban_ci
        # The one-way migration policy (docs/operations.md#migration-policy)
        # makes destructive downgrades raise NotImplementedError. Round-trip
        # only the reversible tail — every revision newer than the most
        # recent one-way migration — by downgrading to that floor.
        run: |
          floor_rev="$(uv run python <<'PY'
          import re
          from pathlib import Path

          versions = Path("alembic/versions")
          one_way: list[str] = []
          for path in sorted(versions.glob("*.py")):
              text = path.read_text()
              if re.search(
                  r"def downgrade\(\)[^\n]*:\s*\n(?:[^\n]*\n){0,10}\s*raise NotImplementedError",
                  text,
              ):
                  m = re.search(r"^revision\s*[:=].*?['\"]([^'\"]+)['\"]", text, re.M)
                  if m:
                      one_way.append(m.group(1))
          print(one_way[-1] if one_way else "base")
          PY
          )"
          if [ "$floor_rev" = "base" ]; then
            uv run alembic downgrade base
          else
            echo "Round-tripping reversible migrations newer than ${floor_rev} (one-way floor)."
            uv run alembic downgrade "$floor_rev"
          fi

      - name: Re-apply after downgrade (idempotency)
        env:
          APP_POSTGRESQL_DSN: postgresql+psycopg://postgres:postgres@localhost:5432/kanban_ci
        run: uv run alembic upgrade head

  docker:
    needs: quality
    runs-on: ubuntu-latest
    # Build, smoke-test, scan (Trivy), and SBOM the image in one job so the
    # scan and SBOM operate on the exact image that was just built.
    strategy:
      fail-fast: false
      matrix:
        # Both deployable images are built, smoke-tested where applicable,
        # scanned with Trivy, and SBOM'd in parallel. The ``runtime`` stage
        # is the API image (uvicorn); the ``runtime-worker`` stage is the
        # arq worker image (``python -m worker``), declared as
        # ``FROM runtime AS runtime-worker`` in the Dockerfile so it
        # inherits every hardening layer of the API image.
        target:
          - runtime
          - runtime-worker
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Build ${{ matrix.target }} image
        run: |
          docker build \
            --target ${{ matrix.target }} \
            -t starter-template-fastapi:ci-${{ matrix.target }} \
            .

      - name: Smoke-test runtime image
        if: matrix.target == 'runtime'
        run: |
          docker run -d --name ci-smoke \
            -e APP_AUTH_JWT_SECRET_KEY=ci-test-secret-key-min-32-chars \
            -e APP_ENVIRONMENT=development \
            -e APP_STORAGE_LOCAL_PATH=/tmp/storage \
            -p 8000:8000 \
            starter-template-fastapi:ci-${{ matrix.target }}
          # Wait for the process to start before probing.
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health/live; then
              echo "Liveness probe passed"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8000/health/live
          docker stop ci-smoke

      - name: Scan ${{ matrix.target }} image for HIGH/CRITICAL CVEs (Trivy)
        # Trivy fails the build on HIGH or CRITICAL findings. ``ignore-unfixed``
        # suppresses advisories that have no upstream fix available yet —
        # there is nothing actionable we can do about those, and they would
        # otherwise block every PR until upstream ships a patched package.
        # Documented per-CVE exceptions go in a ``.trivyignore`` file at the
        # repo root.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: starter-template-fastapi:ci-${{ matrix.target }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          vuln-type: os,library
          ignore-unfixed: true

      - name: Generate SBOM (SPDX JSON) for ${{ matrix.target }} image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: starter-template-fastapi:ci-${{ matrix.target }}
          format: spdx-json
          artifact-name: sbom-${{ matrix.target }}.spdx.json
          output-file: ${{ runner.temp }}/sbom-${{ matrix.target }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-${{ matrix.target }}
          path: ${{ runner.temp }}/sbom-${{ matrix.target }}.spdx.json
          if-no-files-found: error
          retention-days: 30

  dependency-review:
    # ``dependency-review-action`` only supports pull_request / merge_group
    # events — it diffs the base against the head. Skip it on push to main.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      # Read is enough for the scan itself; ``pull-requests: write`` is what
      # lets the action post the inline summary comment on failure.
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Review dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # Single aggregator job used as the required status check in branch protection.
  # Requiring one check instead of enumerating every job keeps branch
  # protection stable when the workflow changes.
  ci-gate:
    name: CI Gate
    needs: [pre-commit, quality, tests, audit, sast, integration, migrations, docker, dependency-review]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All required jobs passed
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for result in $results; do
            # ``skipped`` is allowed because ``dependency-review`` only runs on
            # pull_request events; on push-to-main it is skipped by design.
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "A required job failed or was cancelled: $results"
              exit 1
            fi
          done
          echo "All required jobs passed."
