name: examples-kanban rebase canary

# Weekly rebase of the examples/kanban branch onto main. If the rebase or the
# resulting `make ci` fails, an issue is opened so the example reference does
# not silently rot. The branch exists to preserve the worked ReBAC-with-
# hierarchy example after kanban was removed from main; see openspec change
# `starter-template-foundation`.

on:
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC
  workflow_dispatch: {}

jobs:
  rebase:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify examples/kanban exists
        id: verify
        run: |
          if git ls-remote --exit-code --heads origin examples/kanban >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if branch is missing
        if: steps.verify.outputs.exists == 'false'
        run: |
          echo "examples/kanban branch not found on origin; nothing to canary."

      - name: Attempt rebase onto main
        id: rebase
        if: steps.verify.outputs.exists == 'true'
        run: |
          git checkout examples/kanban
          if git rebase origin/main; then
            echo "result=ok" >> "$GITHUB_OUTPUT"
          else
            git rebase --abort || true
            echo "result=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        if: steps.rebase.outputs.result == 'ok'
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        if: steps.rebase.outputs.result == 'ok'
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Run make ci
        id: ci
        if: steps.rebase.outputs.result == 'ok'
        run: |
          uv sync --frozen
          if make ci; then
            echo "result=ok" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue on conflict
        if: steps.rebase.outputs.result == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "examples/kanban: rebase onto main failed",
              body: "The weekly canary could not rebase `examples/kanban` onto `main`. Resolve manually or delete the branch if the example is no longer worth maintaining.",
              labels: ["examples-canary"],
            })

      - name: Open issue on CI failure
        if: steps.ci.outputs.result == 'fail'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "examples/kanban: make ci failed after rebase",
              body: "The weekly canary rebased `examples/kanban` onto `main` successfully but `make ci` failed afterwards. A platform change has broken the example.",
              labels: ["examples-canary"],
            })
